# Experiment D: Fixed prototype anchors config
# Identical to default.yaml but with init_method: prototype
# so that FixedRelativeRep uses prototype-selected anchors.

model:
  name: fixed_relative_rep
  dim_img: 768
  dim_txt: 768
  num_anchors: 32
  init_method: prototype      # use prototype-selected anchors

baseline:
  mlp_hidden_dim: 256

training:
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-4
  epochs: 20
  temperature: 0.07
  scheduler: cosine
  warmup_epochs: 2
  num_workers: 4
  seed: 42

data:
  dataset: coco
  img_emb_path: data/embeddings/coco_train_img.pt
  txt_emb_path: data/embeddings/coco_train_txt.pt
  num_samples: null

eval:
  flickr_img_emb_path: data/embeddings/flickr30k_test_img.pt
  flickr_txt_emb_path: data/embeddings/flickr30k_test_txt.pt
  imagenet_img_emb_path: data/embeddings/imagenet_val_img.pt
  imagenet_txt_emb_path: data/embeddings/imagenet_val_txt.pt
  eval_every: 1

logging:
  log_dir: results/logs
  save_dir: results/checkpoints
  experiment_name: default
